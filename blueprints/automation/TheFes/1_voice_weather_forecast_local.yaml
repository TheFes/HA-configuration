blueprint:
  domain: automation
  name: Voice - Weather Forecast - Local Assist Blueprint
  author: TheFes
  source_url: https://github.com/TheFes/ha-blueprints/blob/main/weather/1_voice_weather_forecast_local.yaml
  description: "![Image](https://github.com/TheFes/ha-blueprints/blob/main/images/header.png?raw=true)\n\nMore
    detailed information can be found [here](https://github.com/TheFes/ha-blueprints/blob/main/documentation/weather/1_voice_weather_forecast_local.md)\n\n#
    Request the weather forecast fully locally\n\n### Blueprint setup\n\n#### Required\n*
    Set a weather entity to use for the forecasts\n\n#### Optional\n* Add triggers
    or change the existing ones\n* Change or translate the settings for the phrases
    which will be taken from the trigger\n* Change or translate the settings for the
    response given by Assist\n\n#### These translations are already available:\n*
    [Dutch](https://github.com/TheFes/ha-blueprints/blob/main/documentation/weather/translations/1_voice_weather_forecast_nl.md)\n*
    German: There are multiple variants available, just mix and match whatever fits
    your needs\n  * [Variant 1](https://github.com/TheFes/ha-blueprints/blob/main/documentation/weather/translations/1_voice_weather_forecast_de_variant_1.md)\n
    \ * [Variant 2](https://github.com/TheFes/ha-blueprints/blob/main/documentation/weather/translations/1_voice_weather_forecast_de_variant_2.md)\n
    \ * [Variant 3](https://github.com/TheFes/ha-blueprints/blob/main/documentation/weather/translations/1_voice_weather_forecast_de_variant_3.md)\n\n###
    Usage\nAll sentences need to match the format defined in the trigger sentences.
    By default the following sentences are configured:\n\n- what('s| is) [this|next]
    ({phrase}[']s|the [current]|this) weather [forecast]\n- what('s| is) the weather
    [forecast] [for] [this|next] ({phrase}|day)\n- what('ll| will) the weather [forecast]
    be [like] [[for] [[the] coming|this] ({phrase}|day)]\n\n#### Trigger sentence
    syntax\nAll parts between square brackets are optional, the sentence will be recognized
    with and without those parts. A pipe `|` means `or`.\nAll parts betwee round brackets
    are mandatory, but also here the pipe means `or`.\n\nThe {phrase} part refers
    to the moment you want the weather forecast for.\nThis can be `today`, `tomorrow`,
    `day after tomorrow` for a day related to the current day.\nIt can also be a weekday,
    like `Monday` or `Thursday`. In that case the next weekday will be used.\nYou
    can also use `night`, `morning`, `afternoon` or `evening`.\n\n#### Examples without
    phrase (will return the current day)\n* What's the weather\n* What will the weather
    be like\n\n#### Examples with a phrase (will return the requested moment)\n* What's
    the weather tomorrow\n* What is the weather forecast for next Thursday\n* What
    will the weather be like this evening\n"
  input:
    weather_entity:
      name: Weather Entity
      selector:
        entity:
          filter:
          - domain:
            - weather
          multiple: false
          reorder: false
    trigger_settings:
      name: Trigger settings
      icon: mdi:chat
      description: Settings for the trigger, you can adjust them, or translate them
        to your own language
      input:
        trigger:
          name: Trigger for weather forecast
          description: The trigger for this automation. The {phrase} part will be
            used for the period (e.g "tomorrow")
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - what('s| is) [this|next|the] [{phrase}] weather [forecast]
          - what('s| is) the weather [forecast] [for] [this|next] ({phrase}|day)
          - what('ll| will) the weather [forecast] be [like] [[for] [[the] coming|this]
            ({phrase}|day)]
    daily_forecast_settings:
      name: Settings for the daily forecast.
      icon: mdi:chat
      description: Here all the settings for the daily forecast are done
      collapsed: true
      input:
        today:
          name: Today
          description: Phrases to request today's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - today
        tomorrow:
          name: Tomorrow
          description: Phrases to request tomorrow's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - tomorrow
        day_after_tomorrow:
          name: Day after tomorrow
          description: Phrases to request the day after tomorrow's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - day after tomorrow
        monday:
          name: Monday
          description: Phrases to request next monday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - monday
        tuesday:
          name: Tuesday
          description: Phrases to request next Tuesday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - tuesday
        wednesday:
          name: Wednesday
          description: Phrases to request next Wednesday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - wednesday
        thursday:
          name: Thursday
          description: Phrases to request next Thursday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - thursday
        friday:
          name: Friday
          description: Phrases to request next Friday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - friday
        saturday:
          name: Saturday
          description: Phrases to request next Saturday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - saturday
        sunday:
          name: Sunday
          description: Phrases to request next Sunday's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - sunday
    day_part_forecast_settings:
      name: Settings for the forecast of a part of the day.
      icon: mdi:chat
      description: Here all the settings for the daily forecast are done
      collapsed: true
      input:
        current:
          name: Today
          description: Phrases to request today's forecast
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - current
          - now
          - currently
        night:
          name: Night
          description: Phrases to request the forecast for the night
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - night
        morning:
          name: Morning
          description: Phrases to request the forecast for the morning
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - morning
        afternoon:
          name: Afternoon
          description: Phrases to request the forecast for the afternoon
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - afternoon
        evening:
          name: Evening
          description: Phrases to request the forecast for the evening
          selector:
            text:
              multiline: false
              multiple: true
          default:
          - evening
    response_settings:
      name: Settings for the reponses
      icon: mdi:chat
      description: Change or translate the response
      collapsed: true
      input:
        clear:
          name: Clear
          selector:
            text:
              multiple: false
              multiline: false
          default: and clear
        clear-night:
          name: Clear Night
          selector:
            text:
              multiple: false
              multiline: false
          default: and clear
        cloudy:
          name: Cloudy
          selector:
            text:
              multiple: false
              multiline: false
          default: and cloudy
        fog:
          name: Fog
          selector:
            text:
              multiple: false
              multiline: false
          default: and fog
        hail:
          name: Hail
          selector:
            text:
              multiple: false
              multiline: false
          default: with hail
        lightning:
          name: Lightning
          selector:
            text:
              multiple: false
              multiline: false
          default: with lightning
        lightning-rainy:
          name: Lightning
          selector:
            text:
              multiple: false
              multiline: false
          default: with lightning and rain
        partlycloudy:
          name: Partly Cloudy
          selector:
            text:
              multiple: false
              multiline: false
          default: and partly cloudy
        pouring:
          name: Pouring
          selector:
            text:
              multiple: false
              multiline: false
          default: with pouring rain
        rainy:
          name: Rainy
          selector:
            text:
              multiple: false
              multiline: false
          default: and rainy
        snowy:
          name: Snowy
          selector:
            text:
              multiple: false
              multiline: false
          default: and snowy
        snowy-rainy:
          name: Snowy Rainy
          selector:
            text:
              multiple: false
              multiline: false
          default: with snow and rain
        sunny:
          name: Sunny
          selector:
            text:
              multiple: false
              multiline: false
          default: and sunny
        windy:
          name: Windy
          selector:
            text:
              multiple: false
              multiline: false
          default: and windy
        windy-variant:
          name: Windy Cloudy
          selector:
            text:
              multiple: false
              multiline: false
          default: with winds and clouds
        exceptional:
          name: Exceptional
          selector:
            text:
              multiple: false
              multiline: false
          default: with exceptional weather conditions
        rain_warning_threshold:
          name: Rain warning threshold
          description: A warning to bring an umbrella will be given if the precipitation
            probability is above this percentage
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: '%'
              step: 1.0
              mode: slider
          default: 10
        wind_phrases:
          name: 'Phrases to be used to describe the wind speed. Needs to be a yaml
            mapping. Second value is the lower threshold for the description in the
            same unit as wind speed of your forecast is in. Default values are using
            km/h. The lowest value Descriptions are taken from: https://en.wikipedia.org/wiki/Beaufort_scale'
          selector:
            object:
              multiple: false
          default:
            calm: 0
            a light air: 1
            a light breeze: 6
            a gentle breeze: 12
            a moderate breeze: 20
            a fresh breeze: 29
            a strong breeze: 39
            a moderate gale: 50
            a gale: 62
            a strong gale: 75
            a storm: 89
            a violent storm: 103
            a hurricane: 118
        wind_threshold:
          name: Wind threshold
          description: Information regarding wind will be reported if it is above
            this threshold.
          selector:
            number:
              min: 0.0
              max: 200.0
              step: 1.0
              mode: slider
          default: 12
        wind_joke_threshold:
          name: Wind joke threshold
          description: A small joke regarding the wind will be reported if it is above
            this threshold.
          selector:
            number:
              min: 0.0
              max: 200.0
              step: 1.0
              mode: slider
          default: 29
        wind_warning_threshold:
          name: Wind warning threshold
          description: A warning regarding the wind will be reported if it is above
            this threshold.
          selector:
            number:
              min: 0.0
              max: 200.0
              step: 1.0
              mode: slider
          default: 62
        wind_direction:
          name: Phrases to be used to describe the wind direction
          selector:
            object:
              multiple: false
          default:
            N: North
            NE: North East
            E: East
            SE: South East
            S: South
            SW: South West
            W: West
            NW: North West
        value_round:
          name: Value round
          description: If and how to round values, one setting is used for all values
          selector:
            number:
              min: 0.0
              max: 3.0
              step: 1.0
              mode: slider
          default: 0
        response_invalid_phrase:
          name: Response when the requested prhase could not be recognized
          description: The response which will be given by Assist.
          selector:
            text:
              multiline: true
              multiple: false
          default: Unable to get forecasts for {{ phrase }}
        response_no_data:
          name: Response when there is a no data for the requested period
          description: The response which will be given by Assist.
          selector:
            text:
              multiline: true
              multiple: false
          default: No forecast data available for the requested period
        response_current:
          name: Response for current weather
          description: The response given by Assist for the current weather conditions.
          selector:
            text:
              multiline: true
              multiple: false
          default: "It is currently {{ current_temperature }} degrees and {{ current_condition_translated
            }}. Temperatures will range from {{ templow }} up to {{ temperature }}
            degrees today. {% if current_temperature != current_apparent_temperature
            %}It feels like {{ current_apparent_temperature }} degrees.{% endif %}
            {% if precipitation_probability | float(-1) > rain_warning_threshold %}There
            is a {{ precipitation_probability }}% chance of {{ precipitation }} mm
            of rain, so bring an umbrella if you go outside.{% endif %} {% if current_uv_index
            | float(-1) > 3 and current_condition in ['clear', 'partlycloudy'] %}The
            sun is shining brightly, so be sure to apply sunscreen when going outside.{%
            endif %} {%- if current_wind_speed is not none -%}\n  {% if current_wind_speed
            >= wind_threshold %}The wind is {{ current_wind_phrase }} and coming from
            {{ current_wind_direction }}.{% endif %}\n  {% if current_wind_speed >=
            wind_warning_threshold %}So in case you don't have to go out, better stay
            inside.{% elif current_wind_speed >= wind_joke_threshold %}So make sure
            your umbrella doesn't blow away!{% endif %}\n{%- endif %}"
        response_forecast:
          name: Response when there is a forecast found
          description: The response given by Assist for the weather forecast.
          selector:
            text:
              multiline: true
              multiple: false
          default: "It will be {{ temperature }} degrees and {{ condition_translated
            }}. Temperatures will range {% if templow is defined %}from {{ templow
            }} {% endif %}up to {{ temperature }} degrees. {% if temperature != apparent_temperature
            %}It will feel like {{ apparent_temperature }} degrees.{% endif %} {%
            if precipitation_probability | float(-1) > rain_warning_threshold %}There
            is a {{ precipitation_probability }}% chance of {{ precipitation }} mm
            of rain, so bring an umbrella if you go outside.{% endif %} {% if uv_index
            | float(-1) > 3 and condition in ['clear', 'partlycloudy'] %}The sun will
            be shining brightly today, so be sure to apply sunscreen when going outside.{%
            endif %} {%- if wind_speed is not none -%}\n  {% if wind_speed >= wind_threshold
            %}The wind will be {{ wind_phrase }} and coming from {{ wind_direction
            }}.{% endif %}\n  {% if wind_speed >= wind_warning_threshold %}So in case
            you don't have to go out, better stay inside.{% elif wind_speed >= wind_joke_threshold
            %}So make sure your umbrella doesn't blow away!{% endif %}\n{%- endif
            %}"
triggers:
- trigger: conversation
  command: !input trigger
variables:
  version: 20260310
  daily_mapping:
  - phrases: !input current
    delta: 0
  - phrases: !input today
    delta: 0
  - phrases: !input tomorrow
    delta: 1
  - phrases: !input day_after_tomorrow
    delta: 2
  - phrases: !input monday
    delta: '{{ 0 - now().weekday() + (7 if 0 <= now().weekday() else 0) }}'
  - phrases: !input tuesday
    delta: '{{ 1 - now().weekday() + (7 if 1 <= now().weekday() else 0) }}'
  - phrases: !input wednesday
    delta: '{{ 2 - now().weekday() + (7 if 2 <= now().weekday() else 0) }}'
  - phrases: !input thursday
    delta: '{{ 3 - now().weekday() + (7 if 3 <= now().weekday() else 0) }}'
  - phrases: !input friday
    delta: '{{ 4 - now().weekday() + (7 if 4 <= now().weekday() else 0) }}'
  - phrases: !input saturday
    delta: '{{ 5 - now().weekday() + (7 if 5 <= now().weekday() else 0) }}'
  - phrases: !input sunday
    delta: '{{ 6 - now().weekday() + (7 if 6 <= now().weekday() else 0) }}'
  day_part_mapping:
  - phrases: !input night
    start: 00:00:00
    end: 06:00:00
  - phrases: !input morning
    start: 06:00:00
    end: '12:00:00'
  - phrases: !input afternoon
    start: '12:00:00'
    end: '18:00:00'
  - phrases: !input evening
    start: '18:00:00'
    end: '23:59:59'
  phrase: '{{ trigger.get(''slots'', {}).phrase | lower if trigger.get(''slots'',
    {}).get(''phrase'') else none }}'
  current_phrases: !input current
  daily_phrases: '{{ daily_mapping | map(attribute=''phrases'') | sum(start=[]) }}'
  day_part_phrases: '{{ day_part_mapping | map(attribute=''phrases'') | sum(start=[])
    }}'
  current: '{{ phrase is none or phrase in current_phrases }}'
  daily: '{{ current or daily_phrases | select(''contains'', phrase) | list | count
    > 0 }}'
  part_day: '{{ false if phrase is none else day_part_phrases | select(''contains'',
    phrase) | list | count > 0 }}'
  weather_entity: !input weather_entity
  supported: '{% set sf = state_attr(weather_entity, ''supported_features'') | default([],
    true) %} {% set d = [''daily''] if sf in [1, 3, 5, 7] else [] %} {% set h = [''hourly'']
    if sf in [2, 3, 6, 7] else [] %} {% set td = [''twice_daily''] if sf in [4, 5,
    6, 7] else [] %} {{ d + h + td }}

    '
  translations:
    clear: !input clear
    clear-night: !input clear-night
    cloudy: !input cloudy
    fog: !input fog
    hail: !input hail
    lightning: !input lightning
    lightning-rainy: !input lightning-rainy
    partlycloudy: !input partlycloudy
    pouring: !input pouring
    rainy: !input rainy
    snowy: !input snowy
    snowy-rainy: !input snowy-rainy
    sunny: !input sunny
    windy: !input windy
    windy-variant: !input windy-variant
    exceptional: !input exceptional
  wind_phrases: !input wind_phrases
  wind_dir: !input wind_direction
  value_round: !input value_round
  current_condition: '{{ states(weather_entity) }}'
  current_condition_translated: '{{ translations.get(current_condition) }}'
  current_temperature: '{{ state_attr(weather_entity, ''temperature'') | round(value_round,
    default=none) }}'
  current_humidity: '{{ state_attr(weather_entity, ''humidity'') | round(value_round,
    default=none) }}'
  current_dew_point: '{{ state_attr(weather_entity, ''dew_point'') | round(value_round,
    default=none) }}'
  current_cloud_coverage: '{{ state_attr(weather_entity, ''cloud_coverage'') | round(value_round,
    default=none) }}'
  current_uv_index: '{{ state_attr(weather_entity, ''uv_index'') | round(value_round,
    default=none) }}'
  current_pressure: '{{ state_attr(weather_entity, ''pressure'') | round(value_round,
    default=none) }}'
  current_apparent_temperature: '{{ state_attr(weather_entity, ''apparent_temperature'')
    | round(value_round, default=current_temperature) }}'
  current_wind_gust_speed: '{{ state_attr(weather_entity, ''wind_gust_speed'') | round(value_round,
    default=none) }}'
  current_visibility: '{{ state_attr(weather_entity, ''visibility'') | round(value_round,
    default=none) }}'
  current_precipitation: '{{ state_attr(weather_entity, ''precipitation'') | round(value_round,
    default=none) }}'
  current_wind_bearing: '{{ state_attr(weather_entity, ''wind_bearing'') | round(value_round,
    default=none) }}'
  current_wind_direction: '{% set avg_deg = current_wind_bearing %} {% set directions
    = [''N'', ''NE'', ''E'', ''SE'', ''S'', ''SW'', ''W'', ''NW''] %} {% set index
    = ((avg_deg + 22.5) % 360 / 45) | int %} {% set direction = directions[index]
    %} {{ wind_dir.get(direction) }}

    '
  current_wind_speed: '{{ state_attr(weather_entity, ''wind_speed'') | round(value_round,
    default=none) }}'
  current_wind_phrase: '{{ wind_phrases.items() | selectattr(''1'', ''<='', current_wind_speed)
    | map(attribute=''0'') | list | last | default }}'
actions:
- choose:
  - conditions: '{{ daily and (''daily'' in supported or ''twice_daily'' in supported)
      }}'
    sequence:
    - alias: Get the forecast data
      action: weather.get_forecasts
      target:
        entity_id: !input weather_entity
      data:
        type: '{{ ''daily'' if ''daily'' in supported else ''twice_daily'' }}'
      response_variable: weather
      continue_on_error: true
    - alias: Define variables to determine which part to use
      variables:
        delta: '{{ daily_mapping | selectattr(''phrases'', ''contains'', phrase) |
          map(attribute=''delta'') | list | first | default(0) }}'
        start: '{{ today_at() + timedelta(days=delta) }}'
        end: '{{ start | as_datetime + timedelta(days=1) }}'
        day_forecast: "{% set ns = namespace(forecast=[]) %} {% set forecast = weather[weather_entity].forecast
          if weather is defined else [] %} {% for item in forecast %}\n  {% if start
          | as_datetime <= item.datetime | as_datetime | as_local < end | as_datetime
          %}\n    {% set ns.forecast = ns.forecast + [item] %}\n  {% endif %}\n{%
          endfor %} {{ ns.forecast | first | default({}) }}\n"
    - if:
      - condition: template
        value_template: '{{ iif(day_forecast) }}'
      then:
      - alias: Create variables for response
        variables:
          condition: '{{ day_forecast.get(''condition'') }}'
          cloud_coverage: '{{ day_forecast.get(''cloud_coverage'', none) | round(value_round,
            default=none) }}'
          temperature: '{{ day_forecast.get(''temperature'', none) | round(value_round,
            default=none) }}'
          dew_point: '{{ day_forecast.get(''dew_point'', none) | round(value_round,
            default=none) }}'
          pressure: '{{ day_forecast.get(''pressure'', none) | round(value_round,
            default=none) }}'
          humidity: '{{ day_forecast.get(''humidity'', none) | round(value_round,
            default=none) }}'
          templow: '{{ day_forecast.get(''templow'', none) | round(value_round, default=none)
            }}'
          wind_gust_speed: '{{ day_forecast.get(''wind_gust_speed'', none) | round(value_round,
            default=none) }}'
          apparent_temperature: '{{ day_forecast.get(''apparent_temperature'', temperature)
            | round(value_round, default=temperature) }}'
          uv_index: '{{ day_forecast.get(''uv_index'', none) | round(value_round,
            default=none) }}'
          precipitation: '{{ day_forecast.get(''precipitation'', none) | round(value_round,
            default=none) }}'
          precipitation_probability: '{{ day_forecast.get(''precipitation_probability'',
            none) | round(value_round, default=none) }}'
          wind_speed: '{{ day_forecast.get(''wind_speed'', none) | round(value_round,
            default=none) }}'
          condition_translated: '{{ translations.get(condition) }}'
          rain_warning_threshold: !input rain_warning_threshold
          wind_phrase: '{{ wind_phrases.items() | selectattr(''1'', ''<='', wind_speed)
            | map(attribute=''0'') | list | last | default }}'
          wind_threshold: !input wind_threshold
          wind_joke_threshold: !input wind_joke_threshold
          wind_warning_threshold: !input wind_warning_threshold
          wind_direction: '{% set avg_deg = day_forecast.get(''wind_bearing'', 0)
            | float(0) %} {% set directions = [''N'', ''NE'', ''E'', ''SE'', ''S'',
            ''SW'', ''W'', ''NW''] %} {% set index = ((avg_deg + 22.5) % 360 / 45)
            | int %} {% set direction = directions[index] %} {{ wind_dir.get(direction)
            }}

            '
          response_current: !input response_current
          response_forecast: !input response_forecast
      - alias: Send back the response
        choose:
        - conditions: '{{ current }}'
          sequence:
          - set_conversation_response: '{{ response_current }}'
        default:
        - set_conversation_response: '{{ response_forecast }}'
      else:
      - alias: Send back the response
        set_conversation_response: !input response_no_data
  - conditions: '{{ part_day and ''hourly'' in supported }}'
    sequence:
    - alias: Get the forecast data
      action: weather.get_forecasts
      target:
        entity_id: !input weather_entity
      data:
        type: hourly
      response_variable: weather
      continue_on_error: true
    - alias: Define variables to determine which part to use
      variables:
        tomorrow: !input tomorrow
        start_time: '{{ day_part_mapping | selectattr(''phrases'', ''contains'', phrase)
          | map(attribute=''start'') | list | first }}'
        end_time: '{{ day_part_mapping | selectattr(''phrases'', ''contains'', phrase)
          | map(attribute=''end'') | list | first }}'
        next_day: '{{ phrase is search(tomorrow | join(''|'')) }}'
        skip_day: '{{ now() >= today_at(end_time) and not next_day }}'
        delta: '{{ 1 if (next_day or skip_day) else 0 }}'
        start: '{{ today_at() + timedelta(days=delta) + as_timedelta(start_time) }}'
        end: '{{ today_at() + timedelta(days=delta) + as_timedelta(end_time) }}'
        day_part_forecast: "{% set ns = namespace(forecast=[]) %} {% set forecast
          = weather[weather_entity].forecast if weather is defined else [] %} {% for
          item in forecast %}\n  {% if start | as_datetime <= item.datetime | as_datetime
          < end | as_datetime %}\n    {% set ns.forecast = ns.forecast + [item] %}\n
          \ {% endif %}\n{% endfor %} {{ ns.forecast | default([]) }}\n"
    - if:
      - condition: template
        value_template: '{{ iif(day_part_forecast) }}'
      then:
      - alias: Create variables for response
        variables:
          condition: '{{ day_part_forecast | selectattr(''condition'', ''defined'')
            | map(attribute=''condition'') | list | statistical_mode }}'
          cloud_coverage: '{{ day_part_forecast | selectattr(''cloud_coverage'', ''defined'')
            | map(attribute=''cloud_coverage'') | list | average | default(0) | round(value_round)
            }}'
          temperature: '{{ day_part_forecast | selectattr(''temperature'', ''defined'')
            | map(attribute=''temperature'') | list | max | default(0) | round(value_round)
            }}'
          dew_point: '{{ day_part_forecast | selectattr(''dew_point'', ''defined'')
            | map(attribute=''dew_point'') | list | max | default(0) | round(value_round)
            }}'
          pressure: '{{ day_part_forecast | selectattr(''pressure'', ''defined'')
            | map(attribute=''pressure'') | list | max | default(0) | round(value_round)
            }}'
          humidity: '{{ day_part_forecast | selectattr(''humidity'', ''defined'')
            | map(attribute=''humidity'') | list | max | default(0) | round(value_round)
            }}'
          apparent_temperature: '{{ day_part_forecast | selectattr(''apparent_temperature'',
            ''defined'') | map(attribute=''apparent_temperature'') | list | max |
            default(temperature) | round(value_round) }}'
          uv_index: '{{ day_part_forecast | selectattr(''uv_index'', ''defined'')
            | map(attribute=''uv_index'') | list | max | default(0) | round(value_round)
            }}'
          precipitation: '{{ day_part_forecast | selectattr(''precipitation'', ''defined'')
            | map(attribute=''precipitation'') | list | sum | default(0) | round(value_round)
            }}'
          precipitation_probability: '{{ day_part_forecast | selectattr(''precipitation_probability'',
            ''defined'') | map(attribute=''precipitation_probability'') | list | max
            | default(0) | round(value_round) }}'
          wind_speed: '{{ day_part_forecast | selectattr(''wind_speed'', ''defined'')
            | map(attribute=''wind_speed'') | list | max | default(0) | round(value_round)
            }}'
          condition_translated: '{{ translations.get(condition) }}'
          rain_warning_threshold: !input rain_warning_threshold
          wind_phrase: '{{ wind_phrases.items() | selectattr(''1'', ''<='', wind_speed)
            | map(attribute=''0'') | list | last | default }}'
          wind_threshold: !input wind_threshold
          wind_joke_threshold: !input wind_joke_threshold
          wind_warning_threshold: !input wind_warning_threshold
          wind_direction: "{% set bearings = day_part_forecast | selectattr('wind_bearing',
            'defined') | map(attribute='wind_bearing') | list %} {% set ns = namespace(sin_sum=0,
            cos_sum=0) %} {% for b in bearings %}\n  {% set ns.sin_sum = ns.sin_sum
            + sin(b * pi / 180) %}\n  {% set ns.cos_sum = ns.cos_sum + cos(b * pi
            / 180) %}\n{% endfor %} {% set avg_rad = atan2(ns.sin_sum, ns.cos_sum)
            %} {% set avg_deg = (avg_rad * 180 / pi) % 360 %} {% set directions =
            ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'] %} {% set index = ((avg_deg
            + 22.5) % 360 / 45) | int %} {% set direction = directions[index] %} {{
            wind_dir.get(direction) }}\n"
          response_forecast: !input response_forecast
      - alias: Send back the response
        set_conversation_response: !input response_forecast
      else:
      - alias: Send back the response
        set_conversation_response: !input response_no_data
  - conditions: '{{ part_day or daily }}'
    sequence:
    - alias: Send back the response
      set_conversation_response: !input response_no_data
  default:
  - alias: Send back the response
    set_conversation_response: !input response_invalid_phrase
mode: single
