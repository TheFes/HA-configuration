# From: device_tracker_updates.yaml
automation:
  # From: digid_code_kids.yaml
  - id: efac28d0-19f8-42d7-928f-04e09d1191a5
    alias: "Send Digid code for kids to Marleen"
    triggers:
      - alias: "New SMS notification received on Martijn's phone"
        trigger: state
        entity_id: sensor.pixel_10_pro_last_notification
        to: ~
    conditions:
      - alias: "Notification from SMS app"
        condition: state
        entity_id: sensor.pixel_10_pro_last_notification
        attribute: package
        state: "com.google.android.apps.messaging"
      - alias: "SMS regarding DigID code"
        condition: template
        value_template: >
          {{ 'Uw DigiD sms-code om in te loggen bij' in states('sensor.pixel_10_pro_last_notification') }}
    actions:
      - alias: "Send notification to Marleen"
        action: notify.mobile_app_iphone_van_marleen
        data:
          title: "DigiD code"
          message: "{{ trigger.to_state.state }}"
          data:
            ttl: 0
            priority: high

  # From: open_music_app.yaml
  - id: 35106a4b-1055-44db-958c-99b9d9cf721b
    alias: "Open music app on phone Martijn on BT connection"
    mode: restart
    triggers:
      - alias: "Bluetooth connection changed on Martijn's phone"
        trigger: state
        entity_id: sensor.pixel_10_pro_bluetooth_connection
        attribute: connected_paired_devices
    variables:
      bt_added: >
        {%- set bt_old_list = trigger.from_state.attributes.connected_paired_devices %}
        {%- set bt_new_list = trigger.to_state.attributes.connected_paired_devices %}
        {{ 
          bt_new_list
            | reject('in', bt_old_list)
            | join
        }}
      headphones:
        - "60:AB:D2:3C:85:66"
        - "E0:67:81:01:F7:D3"
        - "E8:07:BF:13:99:AB"
        - "14:6C:27:1A:A7:94"
      bt_mac: >
        {{ bt_added.split(' ')[0] if iif(bt_added) else none }}
      work_martijn: !secret work_martijn
    conditions:
      - condition: template
        value_template: "{{ bt_mac is not none and bt_mac in headphones }}"
    actions:
      - alias: "Always start TuneIn when at work or home with Anker Soundcore"
        if:
          - alias: Headphones connected at work or home
            condition: state
            entity_id: person.martijn
            state:
              - home
              - !secret work_martijn
          - alias: Soundcore BT headphones connected
            condition: template
            value_template: "{{ bt_mac == '14:6C:27:1A:A7:94' }}"
        then:
          - alias: Start TuneIn
            action: notify.mobile_app_pixel_10_pro
            data:
              message: "command_launch_app"
              data:
                package_name: "tunein.player"
                ttl: 0
                priority: high
        else:
          - alias: "Send music app selection notification"
            action: notify.mobile_app_pixel_10_pro
            data:
              title: Muziekje of filmpje?
              message: Wil je iets luisteren of zien?
              data:
                package_name: "tunein.player"
                ttl: 0
                tag: "music_choose"
                notification_icon: mdi:music
                actions:
                  - action: "URI"
                    title: "Spotify"
                    uri: "app://com.spotify.music"
                  - action: "URI"
                    title: "TuneIn"
                    uri: "app://tunein.player"
                  - action: "URI"
                    title: "Emby"
                    uri: "app://com.mb.android"
          - alias: "Wait before clearing notification"
            delay:
              minutes: 10
          - alias: "Clear music app selection notification"
            action: notify.mobile_app_pixel_10_pro
            data:
              message: "clear_notification"
              data:
                tag: "music_choose"

  # From: sound_mode_phone.yaml
  - id: e7e51e10-c152-4514-bfc7-393c6d16d468
    alias: "Turn on right sound mode and beacon Martijn based on home proximity"
    mode: queued
    triggers:
      - alias: "Martijn within 2 km of home"
        trigger: numeric_state
        entity_id: sensor.thuis_martijn_distance
        below: 2000
        id: home
      - alias: "Martijn outside 2 km of home"
        trigger: numeric_state
        entity_id: sensor.thuis_martijn_distance
        above: 2000
        id: not_home
    actions:
      - alias: "Home or not?"
        if:
          - condition: trigger
            id: home
        then:
          - alias: "Set phone to normal sound mode"
            action: notify.mobile_app_pixel_10_pro
            data:
              message: "command_ringer_mode"
              data:
                command: "normal"
          - action: notify.mobile_app_pixel_10_pro
            data:
              message: "command_ble_transmitter"
              data:
                command: "turn_on"
        else:
          - alias: "Set phone to vibrate mode"
            action: notify.mobile_app_pixel_10_pro
            data:
              message: "command_ringer_mode"
              data:
                command: "vibrate"
          - action: notify.mobile_app_pixel_10_pro
            data:
              message: "command_ble_transmitter"
              data:
                command: "turn_off"

# From: location_phones.yaml
template:
  - sensor:
      - unique_id: 16bc681e-f85f-4f43-91a0-96da3664bc66
        name: Location phone Marleen
        state: &value_template >-
          {%- set zone = this.attributes.get('zone') %}
          {%- if zone == 'not_home' %}
            {%- set activity = this.attributes.get('activity') %}
            {%- set activities = {
                                    "Cycling": "🚴‍♀️",
                                    "on_bicycle": "🚴‍♂️",
                                    "Automotive": "🚗",
                                    "in_vehicle": "🚗",
                                    "Walking": "🚶‍♀️",
                                    "on_foot": "🚶‍♂️",
                                    "walking": "🚶‍♂️",
                                    "Running": "🏃‍♀️",
                                    "running": "🏃‍♂️"
                                  } 
            %}
            {{ activities.get(activity, '❌🏡') }}
          {%- elif zone != 'home' %}
            {%- set zones = state_attr('sensor.zone_mapper', 'zones') | default({}, true) %}
            {{ zones.get(zone, '❓') }}
          {%- else %}
            {%- set wifi = this.attributes.get('wifi') %}
            {%- set wifi = wifi.split(':')[:-1] | join(':') if ':' in wifi else wifi %}
            {%- set floors = [
                                dict(mac="2c:3a:fd:bf:2c", icon="🏡2️⃣"),
                                dict(mac="2c:3a:fd:df:6d", icon="🏡1️⃣"),
                                dict(mac="3c:a6:2f:f9:ee", icon="🏡0️⃣"),
                                dict(mac="2c:91:ab:e6:1b", icon="🏡0️⃣")
                              ] 
            %}
            {{ floors | selectattr('mac', 'contains', wifi) | map(attribute='icon') | first | default('🏡') }}
          {%- endif %}
        picture: "/api/image/serve/e261093701adc6a0bd34e9c96b5feacb/512x512"
        attributes:
          zone: "{{ states('person.marleen') }}"
          wifi: "{{ states('sensor.iphone_van_marleen_bssid') }}"
          acivity: "{{ states('sensor.nog_invullen') }}"

      - unique_id: 11fde20f-113c-4d69-9995-e4a7ca5dd45d
        name: Location phone Martijn
        state: *value_template
        picture: "/api/image/serve/7dce8363a8fd22c90115bbada5ff395a/512x512"
        attributes:
          zone: "{{ states('person.martijn') }}"
          wifi: "{{ states('sensor.pixel_10_pro_wi_fi_bssid') }}"
          acivity: "{{ states('sensor.pixel_10_pro_detected_activity') }}"

      - unique_id: a240cb3f-d607-4047-95cc-9201c3cadeb7
        name: Zone Mapper
        state: Zone Mapper
        icon: mdi:map
        attributes:
          zones: !secret zone_mapper
